<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SPEAKSMART</title>
    <meta name="description" content="Create your SPEAKSMART account and start learning languages with AI-powered voice recognition.">
    <link rel="stylesheet" href="/styles/globals.css">
</head>
<body class="font-sans antialiased min-h-screen bg-background text-foreground">
    <!-- Navigation -->
    <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 glass">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center gap-2">
                    <div class="w-10 h-10 rounded-xl bg-primary/20 flex items-center justify-center glow-sm">
                        <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4"></path>
                        </svg>
                    </div>
                    <span class="text-xl font-bold gradient-text">SPEAKSMART</span>
                </a>

                <button id="mobile-menu-btn" class="md:hidden p-2 rounded-lg hover:bg-secondary transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
        </div>
        <div id="mobile-menu" class="md:hidden hidden glass border-t border-border">
            <div class="px-4 py-4 space-y-3">
                <a href="/index.html" class="block px-3 py-2 rounded-lg hover:bg-secondary transition-colors">Home</a>
                <a href="/languages.html" class="block px-3 py-2 rounded-lg hover:bg-secondary transition-colors">Languages</a>
            </div>
        </div>
    </nav>

    <main class="min-h-screen pt-24 pb-12 px-4">
        <div class="max-w-md mx-auto">
            <div class="glass rounded-3xl p-8">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold mb-2">Create Account</h1>
                    <p class="text-muted-foreground">Join SPEAKSMART and start learning</p>
                </div>

                <form id="register-form" class="space-y-4">
                    <!-- Display Name -->
                    <div>
                        <label class="block text-sm font-medium mb-2">Full Name</label>
                        <input
                            type="text"
                            id="displayName"
                            placeholder="John Doe"
                            required
                            class="w-full px-4 py-2 rounded-lg bg-input border border-border text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary transition-colors"
                        />
                    </div>

                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-medium mb-2">Email Address</label>
                        <input
                            type="email"
                            id="email"
                            placeholder="you@example.com"
                            required
                            class="w-full px-4 py-2 rounded-lg bg-input border border-border text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary transition-colors"
                        />
                    </div>

                    <!-- Password -->
                    <div>
                        <label class="block text-sm font-medium mb-2">Password</label>
                        <input
                            type="password"
                            id="password"
                            placeholder="••••••••"
                            required
                            minlength="6"
                            class="w-full px-4 py-2 rounded-lg bg-input border border-border text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary transition-colors"
                        />
                        <p class="text-xs text-muted-foreground mt-1">Minimum 6 characters</p>
                    </div>

                    <!-- Confirm Password -->
                    <div>
                        <label class="block text-sm font-medium mb-2">Confirm Password</label>
                        <input
                            type="password"
                            id="confirmPassword"
                            placeholder="••••••••"
                            required
                            class="w-full px-4 py-2 rounded-lg bg-input border border-border text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary transition-colors"
                        />
                    </div>

                    <!-- Terms -->
                    <div class="flex items-center gap-2">
                        <input
                            type="checkbox"
                            id="terms"
                            required
                            class="rounded"
                        />
                        <label for="terms" class="text-sm text-muted-foreground">
                            I agree to the <a href="/terms.html" class="text-primary hover:underline">Terms of Service</a>
                        </label>
                    </div>

                    <!-- Error Message -->
                    <div id="error-message" class="hidden p-3 rounded-lg bg-destructive/10 border border-destructive/20 text-destructive text-sm"></div>

                    <!-- Submit Button -->
                    <button
                        type="submit"
                        class="w-full px-4 py-3 rounded-lg bg-primary text-primary-foreground hover:bg-primary/90 transition-colors font-semibold glow"
                    >
                        Create Account
                    </button>
                </form>

                <!-- Sign In Link -->
                <div class="mt-6 text-center">
                    <p class="text-muted-foreground">
                        Already have an account?
                        <a href="/login.html" class="text-primary hover:underline font-semibold">Sign In</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-border bg-card/50 mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 text-center">
            <p class="text-sm text-muted-foreground">
                2026 SPEAKSMART. All rights reserved.
            </p>
        </div>
    </footer>

    <script src="/js/navbar.js"></script>
    <script src="/js/auth-manager.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const displayName = document.getElementById('displayName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMessage = document.getElementById('error-message');

            // Validation
            if (password !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match';
                errorMessage.classList.remove('hidden');
                return;
            }

            try {
                // Simulate registration (in production, use Firebase or your backend)
                const userData = {
                    email,
                    displayName,
                    uid: Math.random().toString(36).substr(2, 9),
                    level: 1,
                    xp: 0,
                    createdAt: new Date().toISOString()
                };

                localStorage.setItem('speaksmart_user', JSON.stringify(userData));
                console.log("[v0] User registered:", userData);

                window.location.href = '/dashboard.html';
            } catch (error) {
                errorMessage.textContent = error.message || 'Registration failed. Please try again.';
                errorMessage.classList.remove('hidden');
                console.error("[v0] Registration error:", error);
            }
        });
    </script>
</body>
</html>
