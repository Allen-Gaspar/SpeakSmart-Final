<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SPEAKSMART</title>
    <link rel="stylesheet" href="/styles/globals.css">
</head>
<body class="font-sans antialiased min-h-screen bg-background text-foreground">
    <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 glass">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center gap-2">
                    <div class="w-10 h-10 rounded-xl bg-primary/20 flex items-center justify-center glow-sm">
                        <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4"></path>
                        </svg>
                    </div>
                    <span class="text-xl font-bold gradient-text">SPEAKSMART</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="min-h-screen pt-24 pb-12 px-4">
        <div class="max-w-md mx-auto">
            <div class="glass rounded-3xl p-8">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold mb-2">Reset Password</h1>
                    <p class="text-muted-foreground">Enter your email to receive a password reset link</p>
                </div>

                <form id="reset-form" class="space-y-4">
                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-medium mb-2">Email Address</label>
                        <input
                            type="email"
                            id="email"
                            placeholder="you@example.com"
                            required
                            class="w-full px-4 py-2 rounded-lg bg-input border border-border text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary transition-colors"
                        />
                    </div>

                    <!-- Error Message -->
                    <div id="error-message" class="hidden p-3 rounded-lg bg-destructive/10 border border-destructive/20 text-destructive text-sm"></div>

                    <!-- Success Message -->
                    <div id="success-message" class="hidden p-3 rounded-lg bg-primary/10 border border-primary/20 text-primary text-sm"></div>

                    <!-- Submit Button -->
                    <button
                        type="submit"
                        class="w-full px-4 py-3 rounded-lg bg-primary text-primary-foreground hover:bg-primary/90 transition-colors font-semibold glow"
                    >
                        Send Reset Link
                    </button>
                </form>

                <!-- Back to Login -->
                <div class="mt-6 text-center">
                    <p class="text-muted-foreground">
                        Remember your password?
                        <a href="/login.html" class="text-primary hover:underline font-semibold">Sign In</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/navbar.js"></script>
    <script>
        document.getElementById('reset-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const successMsg = document.getElementById('success-message');
            
            console.log("[v0] Password reset requested for:", email);
            
            successMsg.textContent = 'Reset link sent! Check your email.';
            successMsg.classList.remove('hidden');
            
            setTimeout(() => {
                window.location.href = '/login.html';
            }, 2000);
        });
    </script>
</body>
</html>
