<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - SPEAKSMART</title>
    <meta name="description" content="Sign in to your SPEAKSMART account and continue learning languages.">
    <link rel="stylesheet" href="/styles/globals.css">
</head>
<body class="font-sans antialiased min-h-screen bg-background text-foreground">
    <!-- Navigation -->
    <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 glass">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center gap-2">
                    <div class="w-10 h-10 rounded-xl bg-primary/20 flex items-center justify-center glow-sm">
                        <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4"></path>
                        </svg>
                    </div>
                    <span class="text-xl font-bold gradient-text">SPEAKSMART</span>
                </a>

                <button id="mobile-menu-btn" class="md:hidden p-2 rounded-lg hover:bg-secondary transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
        </div>
        <div id="mobile-menu" class="md:hidden hidden glass border-t border-border">
            <div class="px-4 py-4 space-y-3">
                <a href="/index.html" class="block px-3 py-2 rounded-lg hover:bg-secondary transition-colors">Home</a>
                <a href="/languages.html" class="block px-3 py-2 rounded-lg hover:bg-secondary transition-colors">Languages</a>
            </div>
        </div>
    </nav>

    <main class="min-h-screen pt-24 pb-12 px-4">
        <div class="max-w-md mx-auto">
            <div class="glass rounded-3xl p-8">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold mb-2">Welcome Back</h1>
                    <p class="text-muted-foreground">Sign in to your SPEAKSMART account</p>
                </div>

                <form id="login-form" class="space-y-4">
                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-medium mb-2">Email Address</label>
                        <input
                            type="email"
                            id="email"
                            placeholder="you@example.com"
                            required
                            class="w-full px-4 py-2 rounded-lg bg-input border border-border text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary transition-colors"
                        />
                    </div>

                    <!-- Password -->
                    <div>
                        <label class="block text-sm font-medium mb-2">Password</label>
                        <input
                            type="password"
                            id="password"
                            placeholder="••••••••"
                            required
                            class="w-full px-4 py-2 rounded-lg bg-input border border-border text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary transition-colors"
                        />
                    </div>

                    <!-- Remember Me -->
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="remember" class="rounded" />
                        <label for="remember" class="text-sm text-muted-foreground">Remember me</label>
                        <a href="/password-reset.html" class="ml-auto text-sm text-primary hover:underline">Forgot password?</a>
                    </div>

                    <!-- Error Message -->
                    <div id="error-message" class="hidden p-3 rounded-lg bg-destructive/10 border border-destructive/20 text-destructive text-sm"></div>

                    <!-- Submit Button -->
                    <button
                        type="submit"
                        class="w-full px-4 py-3 rounded-lg bg-primary text-primary-foreground hover:bg-primary/90 transition-colors font-semibold glow"
                    >
                        Sign In
                    </button>
                </form>

                <!-- Sign Up Link -->
                <div class="mt-6 text-center">
                    <p class="text-muted-foreground">
                        Don&apos;t have an account?
                        <a href="/register.html" class="text-primary hover:underline font-semibold">Create one</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-border bg-card/50 mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 text-center">
            <p class="text-sm text-muted-foreground">
                2026 SPEAKSMART. All rights reserved.
            </p>
        </div>
    </footer>

    <script src="/js/navbar.js"></script>
    <script src="/js/auth-manager.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const errorMessage = document.getElementById('error-message');

            try {
                // Simulate login (in production, use Firebase or your backend)
                const userData = {
                    email,
                    uid: Math.random().toString(36).substr(2, 9),
                    displayName: email.split('@')[0],
                    level: 5,
                    xp: 1250,
                    lastLogin: new Date().toISOString()
                };

                localStorage.setItem('speaksmart_user', JSON.stringify(userData));
                if (remember) {
                    localStorage.setItem('speaksmart_remember', 'true');
                }

                console.log("[v0] User logged in:", userData);
                window.location.href = '/dashboard.html';
            } catch (error) {
                errorMessage.textContent = error.message || 'Sign in failed. Please check your credentials.';
                errorMessage.classList.remove('hidden');
                console.error("[v0] Login error:", error);
            }
        });
    </script>
</body>
</html>
