<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - SPEAKSMART</title>
    <link rel="stylesheet" href="/styles/globals.css">
</head>
<body class="font-sans antialiased min-h-screen bg-background text-foreground">
    <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 glass">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center gap-2">
                    <div class="w-10 h-10 rounded-xl bg-primary/20 flex items-center justify-center glow-sm">
                        <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4"></path>
                        </svg>
                    </div>
                    <span class="text-xl font-bold gradient-text">SPEAKSMART</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="min-h-screen pt-24 pb-12 px-4">
        <div class="max-w-2xl mx-auto">
            <h1 class="text-4xl font-bold mb-4">Contact Us</h1>
            <p class="text-muted-foreground mb-8">We&apos;d love to hear from you. Send us a message and we&apos;ll respond as soon as possible.</p>

            <div class="glass rounded-2xl p-8">
                <form class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Name</label>
                        <input type="text" placeholder="Your name" class="w-full px-4 py-2 rounded-lg bg-input border border-border text-foreground focus:outline-none focus:ring-2 focus:ring-primary" />
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Email</label>
                        <input type="email" placeholder="your@email.com" class="w-full px-4 py-2 rounded-lg bg-input border border-border text-foreground focus:outline-none focus:ring-2 focus:ring-primary" />
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Message</label>
                        <textarea placeholder="Your message here..." rows="5" class="w-full px-4 py-2 rounded-lg bg-input border border-border text-foreground focus:outline-none focus:ring-2 focus:ring-primary"></textarea>
                    </div>

                    <button type="submit" class="w-full px-4 py-3 rounded-lg bg-primary text-primary-foreground hover:bg-primary/90 font-semibold glow">
                        Send Message
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="border-t border-border bg-card/50 mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 text-center">
            <p class="text-sm text-muted-foreground">2026 SPEAKSMART. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/navbar.js"></script>
</body>
</html>
